service: voice-ai-service

frameworkVersion: '>=3.0.0'

provider:
  name: aws
  runtime: nodejs20.x
  stage: ${opt:stage, 'default'}
  region: ${opt:region, 'eu-north-1'}
  memorySize: 512
  timeout: 30

  # Environment variables for API endpoint configuration
  environment:
    API_VERSION: '1.0.0'
    SERVICE_NAME: 'VoiceAI'

functions:
  voiceAgentApi:
    handler: index.handler
    description: Voice AI Lambda function for Flutter app
    events:
      - http:
          path: voice-agent-api
          method: post
          cors: true
      - http:
          path: voice-agent-api
          method: options
          cors: true

# Custom configuration
custom:
  cors:
    origin: '*'
    headers:
      - Content-Type
      - Authorization
      - X-Requested-With
    allowCredentials: false

# Package configuration
package:
  individually: true
  exclude:
    - '**/*'
  include:
    - 'index.mjs'